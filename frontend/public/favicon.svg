<svg width="180" height="180" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">

  <!-- LETTER SHADOW (black, deeper offset) -->
  <text x="66" y="70"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="88"
        fill="#000000"
        font-weight="bold"
        opacity="0.35">
    NM
  </text>

  <!-- LETTER FRONT (medium-dark gray) -->
  <text x="62" y="66"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="88"
        fill="#444444"
        font-weight="bold">
    NM
  </text>

  <!-- CURVE SHADOW (bigger amplitude + thick) -->
  <g opacity="0.25" transform="translate(2.5,2.5)">
    <path d="M 6 80 C 24 34, 44 110, 62 66 C 80 22, 102 110, 122 80"
          stroke="#000000" stroke-width="14" fill="none"/>
    <path d="M 6 82 C 24 62, 44 98, 62 74 C 80 50, 102 98, 122 82"
          stroke="#000000" stroke-width="13" fill="none"/>
    <path d="M 2 76 C 18 20, 38 118, 62 58 C 86 20, 108 118, 126 76"
          stroke="#000000" stroke-width="13" fill="none"/>
  </g>

  <!-- TRUE CURVES (larger + more expressive) -->
  <path d="M 6 80 C 24 34, 44 110, 62 66 C 80 22, 102 110, 122 80"
        stroke="#1f77b4" stroke-width="14" stroke-dasharray="6 4" fill="none"/>

  <path d="M 6 82 C 24 62, 44 98, 62 74 C 80 50, 102 98, 122 82"
        stroke="#2ca02c" stroke-width="12" stroke-dasharray="6 4" fill="none"/>

  <path d="M 2 76 C 18 20, 38 118, 62 58 C 86 20, 108 118, 126 76"
        stroke="#17becf" stroke-width="12" stroke-dasharray="5 3" fill="none"/>

</svg>